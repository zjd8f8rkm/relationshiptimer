<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>I LOVE YOUUU</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a192f;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #112240;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid #233554;
        }

        #description {
            font-size: 1.2em;
            margin-bottom: 15px;
            color: #64ffda;
        }

        #timer-display {
            font-size: 1.8em;
            font-weight: bold;
            margin: 15px 0;
            color: #ffffff;
            letter-spacing: 1px;
        }

        #label {
            font-size: 1.3em;
            margin-top: 20px;
            color: #ff79c6;
        }

        .heart {
            color: #ff4d4d;
            font-size: 1.5em;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="description">Time since we've been together:</div>
        <div id="timer-display">Loading...</div>
        <div id="label">
            <span class="heart">❤</span> But I love you and I always love you <span class="heart">❤</span>
        </div>
    </div>

    <script>
        function updateTimer() {
            const startDate = new Date("2026-06-25T00:00:00");
            const now = new Date();
            let diff = now - startDate;

            if (diff < 0) {
                document.getElementById("timer-display").innerText = "Our journey is just about to begin!";
                return;
            }

            let totalSeconds = Math.floor(diff / 1000);
            let totalMinutes = Math.floor(totalSeconds / 60);
            let totalHours = Math.floor(totalMinutes / 60);
            let totalDays = Math.floor(totalHours / 24);
            
            let years = Math.floor(totalDays / 365);
            let remainingDays = totalDays % 365;
            let months = Math.floor(remainingDays / 30);
            remainingDays %= 30;
            let weeks = Math.floor(remainingDays / 7);
            let days = remainingDays % 7;
            
            let hours = totalHours % 24;
            let minutes = totalMinutes % 60;
            let seconds = totalSeconds % 60;

            document.getElementById("timer-display").innerText = 
                `${years}Y, ${months}M, ${weeks}W, ${days}D, ${hours}H, ${minutes}M, ${seconds}S`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
